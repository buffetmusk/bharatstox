<!-- ios-haptics — inline of github.com/tijnjh/ios-haptics
     iOS fires UIFeedbackGenerator when a click event hits a switch input.
     label.click() dispatches that event; el.checked= does not. -->
<script>
(function () {
  var _ha = typeof window.matchMedia === 'function' &&
    window.matchMedia('(pointer: coarse)').matches;
  var _lbls = [null, null, null];

  function _mk() {
    _lbls = _lbls.map(function () {
      var lbl = document.createElement('label');
      lbl.ariaHidden = 'true';
      lbl.style.display = 'none';
      var inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.setAttribute('switch', '');
      lbl.appendChild(inp);
      document.body.appendChild(lbl);
      return lbl;
    });
  }

  if (document.body) { _mk(); }
  else { document.addEventListener('DOMContentLoaded', _mk); }

  function _fire(i) {
    try {
      if (navigator.vibrate) {
        if (i === 1) { navigator.vibrate([50, 70, 50]); return; }
        if (i === 2) { navigator.vibrate([50, 70, 50, 70, 50]); return; }
        navigator.vibrate(50); return;
      }
      if (!_ha) return;
      var lbl = _lbls[i];
      if (lbl) lbl.click();
    } catch (e) {}
  }

  function haptic() { _fire(0); }
  haptic.confirm = function () { _fire(1); setTimeout(function () { _fire(1); }, 120); };
  haptic.error   = function () { _fire(2); setTimeout(function () { _fire(2); }, 120); setTimeout(function () { _fire(2); }, 240); };

  window._iosHaptic = haptic;
  window._supportsHaptics = _ha;
})();
</script>
